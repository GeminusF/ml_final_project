name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pinned dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check src tests

      - name: Type-check
        run: python -m mypy src

      - name: Test with required coverage gate
        run: python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=60
