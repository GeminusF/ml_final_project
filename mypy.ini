[mypy]
python_version = 3.12
check_untyped_defs = True
warn_unused_ignores = True
ignore_missing_imports = True

# NumPy's overload for Generator.integers may be inferred as a scalar despite
# an explicit size. Runtime shape assertions and tests cover these arrays.
[mypy-src.trees.random_forest]
disable_error_code = assignment,arg-type

# Experiment orchestration intentionally handles heterogeneous estimator types
# and JSON/NumPy payloads; core algorithm modules remain fully checked.
[mypy-src.experiments.runner]
disable_error_code = arg-type,attr-defined

[mypy-src.experiments.utils]
disable_error_code = operator
